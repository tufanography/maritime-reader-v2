# DELTA + FEED deploy — every 2 hours, at :37 past the hour.
# Keeps the homepage feed AND search ~3h-fresh without re-reading all 51k rows
# from Supabase Nano: a light build (ARTICLE_PAGE_LIMIT=1500 ≈ last ~2 weeks,
# ~2.7s / 2.6MB DB read — measured 2026-06-08) produces the feed + recent article
# detail pages + a small `_pagefind-delta` index. The client merges that delta on
# top of the static base index (`pf.mergeIndex('/_pagefind-delta', {baseUrl:'/'})`).
# Upload is INCREMENTAL (only changed files, manifest in R2) so it's ~free.
# The full BASE index is rebuilt separately by deploy-base.yml (weekly) and is
# NEVER touched here (DEPLOY_MODE=delta excludes _pagefind/).
name: deploy-delta
on:
  schedule:
    - cron: '37 */2 * * *'  # every 2h at :37 (UTC). NOT :00 — GitHub silently drops scheduled runs queued on the contended top-of-hour minute (measured 2026-06-10: the :00 02h & 04h runs never fired, leaving the site on a 4h-stale snapshot). An odd off-peak minute is far less likely to be dropped. R2 incremental upload makes each run cheap (~97-1300 files, ~150k/mo << 1M free); public repo = unlimited GHA.
  workflow_dispatch:         # manual run button
# Serialize with deploy-base so the two never race the R2 manifest.
concurrency:
  group: maritime-r2-deploy
  cancel-in-progress: false
jobs:
  deploy-delta:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22   # ≥21 so global WebSocket exists (supabase-js realtime-js needs it; Node 20 build threw)
          cache: npm
      - run: npm ci
      - name: Build feed + recent article pages (light DB read)
        run: npm run build:feed
        env:
          ARTICLE_PAGE_LIMIT: '1500'
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
      - name: Build delta search index
        run: npx pagefind --site dist --output-subdir _pagefind-delta
      - name: Incremental upload (delta scope — base index untouched)
        run: npm run deploy:r2
        env:
          DEPLOY_MODE: delta
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
